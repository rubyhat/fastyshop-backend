---
openapi: 3.0.1
info:
  title: Fastyshop Backend API
  version: v1
components:
  securitySchemes:
    Bearer:
      type: http
      scheme: bearer
      bearerFormat: JWT
security:
- Bearer: []
paths:
  "/api/v1/auth/signup":
    post:
      summary: Регистрация пользователя
      tags:
      - Auth
      parameters: []
      responses:
        '201':
          description: Успешная регистрация
        '422':
          description: Невалидные параметры
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                user:
                  type: object
                  properties:
                    phone:
                      type: string
                      example: "+7 (700) 123-45-67"
                    email:
                      type: string
                      example: USER@example.com
                    password:
                      type: string
                      example: SecurePass123!
                    password_confirmation:
                      type: string
                      example: SecurePass123!
                    country_code:
                      type: string
                      example: KZ
                  required:
                  - phone
                  - email
                  - password
                  - password_confirmation
                  - country_code
              required:
              - user
  "/api/v1/auth/login":
    post:
      summary: Аутентификация пользователя
      tags:
      - Auth
      parameters: []
      responses:
        '200':
          description: Успешный вход
        '401':
          description: Пользователь не найден
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                phone:
                  type: string
                  example: "+77001234567"
                password:
                  type: string
                  example: SecurePass123!
              required:
              - phone
              - password
